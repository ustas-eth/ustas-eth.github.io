baseURL: https://ustas-eth.github.io/   
languageCode: en-us
title: Ustas Mind
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

markup:
  goldmark:
    parser:
      attribute:
        block: true
        title: true
menu:
  main:
    - identifier: categories
      name: About
      url: /posts/hello-world/
      weight: 10

params:
  ShareButtons: ["linkedin", "twitter"]
  production: true

  title: Ustas Mind
  description: The insides of me

  twitter: ustas_eth
  github: ustas-eth
  
  hideFooter: true

  ShowReadingTime: true
  ShowShareButtons: true

  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

socialIcons:
  - name: x
    url: "https://x.com/"
  - name: github
    url: "https://github.com/"
